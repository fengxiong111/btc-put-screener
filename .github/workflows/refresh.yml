name: refresh-binance-eapi

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        run: node scripts/fetch_binance_eapi.mjs

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/binance_btc_put_candidates.json
          git commit -m "data: refresh" || exit 0
          git push
- name: Notify
  if: success()
  run: |
    MATCHES=$(jq '.matches | length' data/binance_btc_put_candidates.json)
    if [ "$MATCHES" -gt 0 ]; then
      curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
      -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
      -d text="🔥 BTC Put 信号 ${MATCHES} 条"
    fi
name: refresh-binance-eapi

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        run: node scripts/fetch_binance_eapi.mjs

      - name: Notify
        if: success()
        run: |
          FILE="data/binance_btc_put_candidates.json"
          COUNT=$(jq '.matches | length' "$FILE")

          # 手动触发：强制发一条测试消息（不管有没有命中）
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TEXT="TEST · ${COUNT} hits"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              --data-urlencode text="$TEXT"
            exit 0
          fi

          # 定时触发：只有命中才推送（极简：价格 · 天数）
          if [ "$COUNT" -gt 0 ]; then
            TEXT=$(jq -r '.matches[] | "\(.strike) · \(.dte)D"' "$FILE")
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              --data-urlencode text="$TEXT"
          fi

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/binance_btc_put_candidates.json
          git commit -m "data: refresh" || exit 0
          git push